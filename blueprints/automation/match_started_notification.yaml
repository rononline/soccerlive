blueprint:
  name: Soccer Live - Match started notification
  description: Send a notification when a Soccer Live sensor reports that a match started.
  domain: automation
  input:
    soccer_sensor:
      name: Soccer Live sensor
      selector:
        entity:
          domain: sensor
    notify_service:
      name: Notify service
      description: "Example: notify.mobile_app_iphone"
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input soccer_sensor
    attribute: last_match_started_event

condition:
  - condition: template
    value_template: "{{ trigger.to_state.attributes.last_match_started_event is defined }}"
  - condition: template
    value_template: "{{ trigger.from_state is none or trigger.from_state.attributes.last_match_started_event != trigger.to_state.attributes.last_match_started_event }}"

action:
  - service: !input notify_service
    data:
      title: "Match started"
      message: >-
        {% set event = trigger.to_state.attributes.last_match_started_event %}
        {{ event.home_team }} vs {{ event.away_team }}
        {% if event.venue is defined %}· {{ event.venue }}{% endif %}

mode: queued
