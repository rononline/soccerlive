blueprint:
  name: Soccer Live - Red card notification
  description: Send a notification when a Soccer Live sensor reports a red card.
  domain: automation
  input:
    soccer_sensor:
      name: Soccer Live sensor
      selector:
        entity:
          domain: sensor
    notify_service:
      name: Notify service
      description: "Example: notify.mobile_app_iphone"
      selector:
        text:

trigger:
  - platform: state
    entity_id: !input soccer_sensor
    attribute: last_card_event

condition:
  - condition: template
    value_template: "{{ trigger.to_state.attributes.last_card_event is defined }}"
  - condition: template
    value_template: "{{ trigger.to_state.attributes.last_card_event.card_type == 'RED' }}"
  - condition: template
    value_template: "{{ trigger.from_state is none or trigger.from_state.attributes.last_card_event != trigger.to_state.attributes.last_card_event }}"

action:
  - service: !input notify_service
    data:
      title: "Red card"
      message: >-
        {% set event = trigger.to_state.attributes.last_card_event %}
        {{ event.player }} · {{ event.team }}
        {{ event.home_team }} vs {{ event.away_team }}

mode: queued
