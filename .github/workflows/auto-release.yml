name: Auto Release

on:
  push:
    branches: [main]
    paths:
      - 'custom_components/soccer_live/manifest.json'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version from manifest.json
        id: version
        run: |
          VERSION=$(jq -r '.version' custom_components/soccer_live/manifest.json)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes from version-bump commit
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Find the commit that first introduced this version in manifest.json
          NOTE=$(git log --format="%H" -- custom_components/soccer_live/manifest.json | while read sha; do
            prev=$(git show "${sha}^:custom_components/soccer_live/manifest.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)
            curr=$(git show "${sha}:custom_components/soccer_live/manifest.json" 2>/dev/null | jq -r '.version // empty' 2>/dev/null || true)
            if [ "$curr" = "$VERSION" ] && [ "$prev" != "$VERSION" ]; then
              git log -1 --pretty=%B "$sha"
              break
            fi
          done)
          [ -z "$NOTE" ] && NOTE=$(git log -1 --pretty=%B)
          {
            echo 'notes<<EOF_NOTES'
            echo "$NOTE"
            echo 'EOF_NOTES'
          } >> "$GITHUB_OUTPUT"

      - name: Build zip asset
        if: steps.check.outputs.exists == 'false'
        working-directory: custom_components
        run: |
          zip -r "$GITHUB_WORKSPACE/soccer_live.zip" soccer_live/ \
            --exclude "soccer_live/__pycache__/*" \
            --exclude "soccer_live/*.pyc" \
            --exclude "soccer_live/.claude/*"

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          body: ${{ steps.notes.outputs.notes }}
          files: soccer_live.zip
          draft: false
          prerelease: false
